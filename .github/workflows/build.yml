name: Build Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Force Build DLL
        run: |
          # 1. Create a project file that tells SMAPI to SHUT OFF the game-check
          echo '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><TargetFramework>net6.0</TargetFramework><ImplicitUsings>enable</ImplicitUsings><Nullable>enable</Nullable><EnableModDeploy>false</EnableModDeploy><EnableModZip>false</EnableModZip><IgnoreModGamePath>true</IgnoreModGamePath></PropertyGroup><ItemGroup><PackageReference Include="Pathoschild.Stardew.ModBuildConfig" Version="4.1.1" /></ItemGroup></Project>' > SmartClick.csproj
          
          # 2. Compile the DLL directly using the ModEntry.cs in your main folder
          dotnet build SmartClick.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: CinderboxSmartClick-DLL
          path: bin/Release/net6.0/SmartClick.dll
          
