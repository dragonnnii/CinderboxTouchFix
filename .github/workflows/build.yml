name: Build Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Manual Compile
        run: |
          # We create a simple project that doesn't check for the game
          dotnet new classlib -n LeftClickAltar
          
          # We manually add the SMAPI reference so it can understand your code
          dotnet add LeftClickAltar/LeftClickAltar.csproj package Pathoschild.Stardew.ModBuildConfig --version 4.1.1
          
          # Move your code into the folder and build it
          copy ModEntry.cs LeftClickAltar\ModEntry.cs
          dotnet build LeftClickAltar/LeftClickAltar.csproj -c Release /p:IgnoreModGamePath=true

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: LeftClickAltar-DLL
          path: LeftClickAltar/bin/Release/net6.0/LeftClickAltar.dll
          
