name: Build Mod
on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Create and Build Project
        run: |
          # 1. Create the project folder
          mkdir CinderboxSmartClick
          
          # 2. Create a custom .csproj file that ignores the game path by default
          echo '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><TargetFramework>net6.0</TargetFramework><ImplicitUsings>enable</ImplicitUsings><Nullable>enable</Nullable><EnableModDeploy>false</EnableModDeploy><IgnoreModGamePath>true</IgnoreModGamePath></PropertyGroup><ItemGroup><PackageReference Include="Pathoschild.Stardew.ModBuildConfig" Version="4.1.1" /></ItemGroup></Project>' > CinderboxSmartClick/CinderboxSmartClick.csproj
          
          # 3. Copy your code into the folder
          copy ModEntry.cs CinderboxSmartClick\ModEntry.cs
          
          # 4. Build it
          dotnet build CinderboxSmartClick/CinderboxSmartClick.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: CinderboxSmartClick-DLL
          path: CinderboxSmartClick/bin/Release/net6.0/CinderboxSmartClick.dll
          
